<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>7 MESES💖</title>
  <style>
    :root { --rosa:#ff6aa2; --magenta:#ff2d55; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "Poppins", system-ui, sans-serif;
      color: #fff;
      background: linear-gradient(120deg, #0b0b10, #131325 40%, #1d0f1d);
      overflow: hidden;
    }
    .bg {
      position: fixed; inset: 0; z-index: -2;
      background:
        radial-gradient(1200px 800px at 20% 30%, rgba(255,45,85,.12), transparent 60%),
        radial-gradient(900px 700px at 80% 70%, rgba(255,106,162,.12), transparent 60%);
      filter: saturate(120%);
      animation: floatBg 18s ease-in-out infinite alternate;
    }
    @keyframes floatBg { to { transform: translateY(-20px); } }
    .hearts { position: fixed; inset: 0; pointer-events: none; z-index: -1; }
    .heart {
      position: absolute; width: 16px; height: 16px; opacity: .75;
      background: var(--rosa); transform: rotate(45deg);
      animation: rise 8s linear infinite;
      filter: drop-shadow(0 0 6px rgba(255,106,162,.6));
    }
    .heart::before, .heart::after {
      content: ""; position: absolute; width: 16px; height: 16px; background: var(--rosa); border-radius: 50%;
    }
    .heart::before { left: -8px; }
    .heart::after  { top: -8px; }
    @keyframes rise {
      0% { transform: translateY(20vh) scale(.8) rotate(45deg); opacity: 0; }
      15% { opacity: .9; }
      100% { transform: translateY(-120vh) scale(1.4) rotate(45deg); opacity: 0; }
    }
    .wrap { height: 100%; display: grid; place-items: center; padding: 24px; text-align: center; }
    .card {
      max-width: 720px; width: 100%;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 24px;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 40px rgba(0,0,0,.35);
      padding: 28px 24px 20px;
    }
    .badge { display:inline-block; padding:6px 12px; border-radius:999px; font-size:12px; letter-spacing:.4px;
      background:rgba(255,106,162,.18); border:1px solid rgba(255,106,162,.4); margin-bottom:10px;
    }
    h1 {
      margin:8px 0 4px; font-weight:600; font-size:clamp(28px,5vw,40px);
      text-shadow:0 4px 20px rgba(255,45,85,.25);
    }
    .type { min-height:2.2em; white-space:pre-wrap; }
    .counter { margin-top:10px; font-weight:300; font-size:clamp(14px,3.5vw,18px); opacity:.9; }
    .buttons { display:flex; gap:12px; justify-content:center; margin-top:18px; flex-wrap:wrap; }
    .btn {
      padding:10px 16px; border-radius:14px; font-weight:600; border:1px solid transparent;
      background:linear-gradient(90deg, var(--magenta), var(--rosa));
      color:#fff; cursor:pointer; transition:transform .12s ease, box-shadow .2s;
      box-shadow:0 8px 24px rgba(255,45,85,.28);
    }
    .btn:hover { transform:translateY(-2px); box-shadow:0 12px 30px rgba(255,45,85,.34); }
    .btn.ghost { background:transparent; border-color:rgba(255,255,255,.25); }
    .quote { margin-top:16px; font-size:15px; opacity:.95; display:none; }
    footer { margin-top:18px; font-size:12px; opacity:.7; }

    .welcome {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      background: rgba(11, 11, 16, .82);
      backdrop-filter: blur(8px);
      transition: opacity .8s ease, visibility .8s ease;
    }
    .welcome.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .welcome-box {
      max-width: 640px;
      width: 100%;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 26px;
      padding: 34px 24px;
      box-shadow: 0 14px 45px rgba(0,0,0,.38);
    }
    .welcome-heart {
      font-size: 42px;
      margin-bottom: 10px;
      animation: heartbeat 1.5s ease-in-out infinite;
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      35% { transform: scale(1.16); }
      60% { transform: scale(.96); }
    }
    .welcome h2 {
      margin: 8px 0 12px;
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 600;
      text-shadow: 0 4px 20px rgba(255,45,85,.28);
    }
    .welcome p {
      margin: 0 auto 22px;
      max-width: 540px;
      font-size: clamp(15px, 3.5vw, 18px);
      line-height: 1.6;
      opacity: .92;
    }
    .card {
      opacity: 0;
      transform: translateY(18px) scale(.98);
      transition: opacity .9s ease, transform .9s ease;
    }
    .card.show {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    @media (max-width:420px) {
      .card { padding:22px 18px 16px; }
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="hearts" id="hearts"></div>
  <div class="welcome" id="welcome">
    <div class="welcome-box">
      <div class="welcome-heart">❤️</div>
      <h2>Tengo algo muy especial que decirte...</h2>
      <p>Lo único que te pido es que abras tu corazón por un momento... porque cada palabra que estás a punto de leer fue escrita pensando únicamente en ti.</p>
      <button class="btn" id="openGift">💌 Ábrelo, mi amor</button>
    </div>
  </div>
  <div class="wrap">
    <div class="card" id="mainCard">
      <span class="badge">Para mi niña hermosa 💞</span>
      <h1 id="title">Gracias por estos maravillosos 5 años💞</h1>
      <div id="type" class="type"></div>
      <div id="counter" class="counter"></div>
      <div class="buttons">
        <button class="btn" id="surprise">💌 Mensaje sorpresa para la mas hermosa</button>
        <button class="btn ghost" id="play">🎵 Nuestra canción</button>
      </div>
      <p class="quote" id="quote"></p>
      <footer>Hecho con amor para el amor de mi vida ❤️</footer>
    </div>
  </div>
  <audio id="audio" preload="none"></audio>
  <script>
    "use strict";

    const NOMBRE_1 = "my";
    const NOMBRE_2 = "love ";
    const FECHA_INICIO = "2021-01-05"; // Fecha de inicio de nuestra historia
    const MENSAJE = "Gracias por formar parte de mi vida y por darme el privilegio de estar a tu lado. Gracias por estos maravillosos 5 años de amor, de risas, de aprendizajes y de momentos que jamás cambiaría por nada. 💖";
    const CANCION_URL = "Mi_gran_amor_Jorge_Cuellar.mp3"; // el audio
// aca va las frases lo que dice el mensaje sorpresa
    const FRASES = [
      "Gracias por darme el honor de ser parte de tu vida. ❤️✨",
      "Mi vida a tu lado es más perfecta, así como lo es tu sonrisa. ✨",
      "En cada latido de mi corazón está tu nombre. ❤️",
      "Gracias por permitirme amarte. 💕",
      "Te seré fiel toda la eternidad. 💕",
      "Quiero caminar a tu lado toda la vida. 💕",
      "Mi amor eterno siempre será para ti. 🌸",
      "Eres el sueño del que nunca quiero despertar. 🌙",
      "Gracias por existir en mi vida, gracias por amarme. 💫",
      "Te amo más de lo que las palabras pueden expresar. 💕"
    ];

    const namesEl = document.getElementById("names");
    const typeEl = document.getElementById("type");
    const counterEl = document.getElementById("counter");
    const quoteEl = document.getElementById("quote");
    const audioEl = document.getElementById("audio");
    const heartsContainer = document.getElementById("hearts");
    const playBtn = document.getElementById("play");
    const welcomeEl = document.getElementById("welcome");
    const openGiftBtn = document.getElementById("openGift");
    const mainCard = document.getElementById("mainCard");

    

    function typeWriter(text, delay = 45) {
      let i = 0;
      typeEl.textContent = "";
      function tick() {
        typeEl.textContent = text.slice(0, i++);
        if (i <= text.length) setTimeout(tick, delay);
      }
      tick();
    }

    counterEl.innerHTML =
      "No necesito contar los días para saber lo feliz que soy. Solo necesito mirarte para recordar que cada momento a tu lado ha sido el mejor regalo que la vida me ha dado. Gracias por regalarme los cinco años más hermosos de mi vida. Te amo. ❤️";

    function spawnHeart() {
      const h = document.createElement("div");
      h.className = "heart";
      const size = 10 + Math.random() * 18;
      h.style.width = size + "px";
      h.style.height = size + "px";
      h.style.left = Math.random() * 100 + "vw";
      h.style.animationDuration = 6 + Math.random() * 6 + "s";
      h.style.opacity = (0.6 + Math.random() * 0.4).toFixed(2);
      heartsContainer.appendChild(h);
      setTimeout(() => h.remove(), 12000);
    }
    setInterval(spawnHeart, 350);

    document.getElementById("surprise").addEventListener("click", () => {
      const frase = FRASES[Math.floor(Math.random() * FRASES.length)];
      quoteEl.textContent = frase;
      quoteEl.style.display = "block";
    });


    openGiftBtn.addEventListener("click", () => {
      welcomeEl.classList.add("hidden");
      mainCard.classList.add("show");
      typeWriter(MENSAJE);
      audioEl.currentTime = 0;
      audioEl.play().catch(() => {
        playBtn.textContent = "🎵 Nuestra canción";
      });
    });

    audioEl.src = CANCION_URL;

    let playing = false;
    playBtn.addEventListener("click", () => {
      if (!playing) {
        audioEl.currentTime = 0;
        audioEl.play();
      } else {
        audioEl.pause();
      }
    });
    audioEl.addEventListener("play", () => {
      playing = true;
      playBtn.textContent = "⏸️ Pausar nuestra canción";
    });
    audioEl.addEventListener("pause", () => {
      playing = false;
      playBtn.textContent = "🎵 Nuestra canción";
    });
  </script>
</body>
</html>
